<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <meta name="referrer" content="origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Peter Doering</title>
  <style>
    body {
      margin: 0;
    }
    #graphiql {
      height: 100dvh;
    }
    .loading {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system, -apple-system, "San Francisco", ".SFNSDisplay-Regular", "Segoe UI", Segoe, "Segoe WP", "Helvetica Neue", helvetica, "Lucida Grande", arial, sans-serif;
      font-size: 1.5rem;
      color: #333;
    }
  </style>
  <link
    rel="stylesheet"
    href="https://esm.sh/graphiql@5.2.2/dist/style.css"
    crossorigin="anonymous"
  />
</head>
<body>
  <div id="graphiql">
    <div class="loading">Loading&hellip;</div>
  </div>
  <script>
    localStorage.removeItem("graphiql:query");
    localStorage.removeItem("graphiql:tabState");
  </script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.5",
        "react/": "https://esm.sh/react@19.2.5/",
        "react-dom": "https://esm.sh/react-dom@19.2.5",
        "react-dom/": "https://esm.sh/react-dom@19.2.5/",
        "graphiql": "https://esm.sh/graphiql@5.2.2?standalone&external=react,react-dom,@graphiql/react,graphql",
        "graphiql/": "https://esm.sh/graphiql@5.2.2/",
        "@graphiql/react": "https://esm.sh/@graphiql/react@0.37.3?standalone&external=react,react-dom,graphql,@graphiql/toolkit,@emotion/is-prop-valid",
        "@graphiql/toolkit": "https://esm.sh/@graphiql/toolkit@0.11.3?standalone&external=graphql",
        "graphql": "https://esm.sh/graphql@16.13.2",
        "@emotion/is-prop-valid": "data:text/javascript,"
      }
    }
  </script>
  <script type="module">
    import React from 'react';
    import ReactDOM from 'react-dom/client';
    import { GraphiQL } from 'graphiql';
    import { createGraphiQLFetcher } from '@graphiql/toolkit';
    import 'graphiql/setup-workers/esm.sh';

    const DEFAULT_QUERY = `# Hello 👋
# My name is Peter. I'm a software developer from Germany.
# I made this GraphQL API to my homepage because everyone ❤ GraphQL.
# Here's a sample query:

{
  name
  location
  job
  employedAt
  github
  homepage
  expertFor
  currentlyLearning
  stack
  programmingLanguages
  expertForProducts {
    name
    description
    homepage
  }
}`;

    // Parse the search string to get url parameters.
    var search = window.location.search;
    var parameters = {};
    search.substr(1).split('&').forEach(function (entry) {
      var eq = entry.indexOf('=');
      if (eq >= 0) {
        parameters[decodeURIComponent(entry.slice(0, eq))] =
          decodeURIComponent(entry.slice(eq + 1));
      }
    });

    // if variables was provided, try to format it.
    if (parameters.variables) {
      try {
        parameters.variables =
          JSON.stringify(JSON.parse(parameters.variables), null, 2);
        } catch (e) {
          // Do nothing, we want to display the invalid JSON as a string, rather
          // than present an error.
        }
    }

    // When the query and variables string is edited, update the URL bar so
    // that it can be easily shared
    function onEditQuery(newQuery) {
      parameters.query = newQuery;
      updateURL();
    }
    function onEditVariables(newVariables) {
      parameters.variables = newVariables;
      updateURL();
    }
    function onEditOperationName(newOperationName) {
      parameters.operationName = newOperationName;
      updateURL();
    }
    function updateURL() {
      var newSearch = '?' + Object.keys(parameters).filter(function (key) {
        return Boolean(parameters[key]);
      }).map(function (key) {
        return encodeURIComponent(key) + '=' +
          encodeURIComponent(parameters[key]);
      }).join('&');
      history.replaceState(null, null, newSearch);
    }

    const fetcher = createGraphiQLFetcher({ url: '/graphql' });

    function App() {
      return React.createElement(GraphiQL, {
        fetcher,
        query: parameters.query,
        defaultQuery: DEFAULT_QUERY,
        variables: parameters.variables,
        operationName: parameters.operationName,
        onEditQuery,
        onEditVariables,
        onEditOperationName,
      });
    }

    const container = document.getElementById('graphiql');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
